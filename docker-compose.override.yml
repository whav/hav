services:
    nginx:
        ports:
            - "8000:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf


    django-asgi:
        depends_on:
          - redis
          - hav_db
        #  - whav_db
        environment:
          - DEBUG=True
        volumes:
          - ./src/hav:/code/hav
          - ./tests:/code/tests
          - ./dist/ingestlog:/archive/hav/ingestlog
          - ./fixtures:/fixtures
        command: /venv/bin/python ./manage.py runserver 0.0.0.0:8000

    django-wsgi:
        depends_on:
          - hav_db
        #  - whav_db
        environment:
          - DEBUG=True
        volumes:
            - ./src/hav:/code/hav
            - ./tests:/code/tests
            - ./pytest.ini:/code/pytest.ini
            - ./dist/ingestlog:/archive/hav/ingestlog
            - ./fixtures:/fixtures
        command: /venv/bin/python ./manage.py runserver --noasgi 0.0.0.0:8000
        healthcheck:
          test: curl --fail -s http://localhost:8000/dbadmin/ || exit 1
          start_period: 30s
          interval: 20s
          timeout: 3s
          retries: 4

    imaginary:
        ports:
            - "9000:9000"

    hav_db:
        image: postgres:15
        environment:
            - POSTGRES_PASSWORD=opensesame
            - POSTGRES_USER=hav
        expose:
            - 5432
        volumes:
          - ./dbdumps:/dbdumps
          - ./dist/pg_data:/var/lib/postgresql/data

